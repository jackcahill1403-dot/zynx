services:
  - type: web
    name: zynx-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # OpenRouter keys — set these in the Render dashboard (kept out of git).
      # The app also tries _2 / _3 variants and a generic OPENROUTER_API_KEY fallback.
      - key: OPENROUTER_GLM_AIR_API_KEY_1
        sync: false
      - key: OPENROUTER_KIMI_K2_API_KEY_1
        sync: false
      - key: OPENROUTER_MISTRAL_NEMO_API_KEY_1
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZYNX_SITE_URL
        sync: false
